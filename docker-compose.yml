version: '3.8'

services:
  backend:
    build: 
      # WICHTIG: context muss auf den Unterordner zeigen, relativ zur docker-compose.yml
      context: ./backend
      dockerfile: Dockerfile
    container_name: wg_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - wg_db_data:/data
    environment:
      - GEMINI_API_KEY
      - SECRET_KEY
      - BACKEND_CORS_ORIGINS
      - SQLALCHEMY_DATABASE_URI=sqlite:////data/ledger.db

  frontend:
    build: 
      # WICHTIG: context muss auf den Unterordner zeigen
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wg_frontend
    restart: unless-stopped
    ports:
      - "8555:3000"
    depends_on:
      - backend
    environment:
      - PRIVATE_API_URL=http://backend:8000/api
      - PUBLIC_API_URL=http://wilhelm-teiler-2.local:8555/api

volumes:
  wg_db_data:
    name: wg_finance_database